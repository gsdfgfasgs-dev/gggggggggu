<!-- templates/desktop/emails/base_email.html — aligned with site theme (dark + red #E2323E + accent #5ec5b0) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #0a0809 0%, #060507 45%, #0c0a0b 100%);
            color: #e8e6ea;
            line-height: 1.5;
        }

        .email-wrapper {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .email-container {
            background: #100e10;
            border: 1px solid rgba(184, 74, 85, 0.35);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.45);
        }

        .email-header {
            background: linear-gradient(
                135deg,
                #0F0B12 0%,
                #3a1520 16%,
                #5c1828 30%,
                #7a1e30 42%,
                #9e2438 50%,
                #c81d32 56%,
                #b83240 62%,
                #9a4a52 68%,
                #7a635f 74%,
                #5c7f76 80%,
                #489688 86%,
                #4eaa9a 92%,
                #5ec5b0 100%
            );
            padding: 28px 24px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .email-logo {
            font-size: 1.35rem;
            font-weight: 800;
            color: #ffffff;
            margin: 0;
            letter-spacing: 0.02em;
            text-shadow: 0 1px 12px rgba(0, 0, 0, 0.35);
        }

        .email-logo span {
            color: #E2323E;
        }

        .email-content {
            padding: 28px 24px;
            background: #100e10;
        }

        .email-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }

        .email-subtitle {
            font-size: 0.95rem;
            color: #D8D8E0;
            margin: 0 0 22px 0;
        }

        .email-text {
            color: #e8e6ea;
            margin: 0 0 16px 0;
        }

        .email-text p {
            margin: 0 0 12px 0;
        }

        .email-text p:last-child {
            margin-bottom: 0;
        }

        .email-text-muted {
            font-size: 0.85rem;
            color: #9a9398;
        }

        .email-text-muted a {
            color: #E2323E;
            text-decoration: none;
        }

        .email-text-muted a:hover {
            text-decoration: underline;
        }

        /* Primary CTA — same idea as .m-btn--primary on site */
        .email-button {
            display: inline-block;
            background: linear-gradient(180deg, #5ec5b0 0%, #4aad99 100%);
            color: #0a0f12;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 0.95rem;
            text-align: center;
            margin: 22px 0 14px;
            box-shadow: 0 10px 24px rgba(74, 173, 153, 0.28);
        }

        .email-link-fallback {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px 16px;
            margin: 16px 0;
            word-break: break-all;
            font-size: 0.82rem;
            color: #D8D8E0;
        }

        .email-link-fallback a {
            color: #5ec5b0;
            text-decoration: none;
        }

        .email-link-fallback a:hover {
            text-decoration: underline;
        }

        .email-info-box {
            background: rgba(94, 197, 176, 0.08);
            border-left: 4px solid #5ec5b0;
            border-radius: 12px;
            padding: 16px;
            margin: 22px 0;
        }

        .email-info-box p {
            margin: 0 0 8px 0;
            font-size: 0.84rem;
            color: #D8D8E0;
        }

        .email-info-box p:last-child {
            margin-bottom: 0;
        }

        .email-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 22px 0;
        }

        .email-footer {
            background: #060507;
            padding: 22px 24px;
            text-align: center;
            border-top: 1px solid rgba(184, 74, 85, 0.22);
        }

        .email-footer-text {
            font-size: 0.72rem;
            color: #9a9398;
            margin: 0 0 8px 0;
        }

        .email-footer-text a {
            color: #B84A55;
            text-decoration: none;
        }

        .email-footer-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 560px) {
            .email-wrapper {
                padding: 20px 14px;
            }

            .email-header {
                padding: 22px 18px;
            }

            .email-content {
                padding: 22px 18px;
            }

            .email-footer {
                padding: 18px;
            }

            .email-title {
                font-size: 1.3rem;
            }

            .email-button {
                display: block;
                text-align: center;
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-container">
            <div class="email-header">
                <h1 class="email-logo">
                    RoyalLink
                </h1>
            </div>

            <div class="email-content">
                {% block content %}{% endblock %}
            </div>

            <div class="email-footer">
                <p class="email-footer-text">
                    © {% now "Y" %} RoyalLink. All rights reserved.
                </p>
                <p class="email-footer-text">
                    This email was sent to {{ to_email }}.<br>
                    If you didn't request this, you can safely ignore it.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
